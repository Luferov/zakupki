services:
  postgres:
    image: postgres:16-alpine
    container_name: zakupki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zakupki
      POSTGRES_USER: zakupki
      POSTGRES_PASSWORD: zakupki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zakupki -d zakupki"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
